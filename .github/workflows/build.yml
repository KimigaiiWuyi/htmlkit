name: Build Wheels
on:
  push:
  workflow_dispatch:
  pull_request:
    branches:
      - master

env:
  XMAKE_VERSION: "2.9.9"

jobs:
  build_macosx_arm64:
    name: Build wheel for ${{ matrix.python }}-macosx_arm64
    runs-on: macos-14
    continue-on-error: ${{ contains(matrix.python, 'cp314') }}
    strategy:
      fail-fast: false
      matrix:
        python: [cp310, cp311, cp312, cp313, cp313t, cp314t]

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          cache-suffix: ${{ matrix.python }}-macosx_arm64
          cache-dependency-glob: uv.lock
      - name: Install Xmake
        run: brew install xmake
      - name: Cache Xmake
        uses: actions/cache@v4
        with:
          path: ~/.xmake
          key: xmake-macosx_arm64-${{ hashFiles('xmake.lua') }}
      - name: Workaround for SourceForge 404 (giflib)
        run: |
          mkdir -p ~/.xmake/searchdirs
          curl -L "https://github.com/python-pillow/pillow-depends/raw/main/giflib-5.2.2.tar.gz" -o ~/.xmake/searchdirs/giflib-5.2.2.tar.gz
          xmake g --pkg_searchdirs=~/.xmake/searchdirs
      - name: Build wheel
        uses: pypa/cibuildwheel@v3.2.0
        env:
          CIBW_BUILD: ${{ matrix.python }}-macosx_arm64
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.python }}-macosx_arm64
          path: ./wheelhouse/*.whl

  build_macosx_x86_64:
    name: Build wheel for ${{ matrix.python }}-macosx_x86_64
    runs-on: macos-13
    continue-on-error: ${{ contains(matrix.python, 'cp314') }}
    strategy:
      fail-fast: false
      matrix:
        python: [cp310, cp311, cp312, cp313, cp313t, cp314t]

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          cache-suffix: ${{ matrix.python }}-macosx_x86_64
          cache-dependency-glob: uv.lock
      - name: Install Xmake
        run: brew install xmake
      - name: Cache Xmake
        uses: actions/cache@v4
        with:
          path: ~/.xmake
          key: xmake-macosx_x86_64-${{ hashFiles('xmake.lua') }}
      - name: Workaround for SourceForge 404 (giflib)
        run: |
          mkdir -p ~/.xmake/searchdirs
          curl -L "https://github.com/python-pillow/pillow-depends/raw/main/giflib-5.2.2.tar.gz" -o ~/.xmake/searchdirs/giflib-5.2.2.tar.gz
          xmake g --pkg_searchdirs=~/.xmake/searchdirs
      - name: Build wheel
        uses: pypa/cibuildwheel@v3.2.0
        env:
          CIBW_BUILD: ${{ matrix.python }}-macosx_x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.python }}-macosx_x86_64
          path: ./wheelhouse/*.whl

  build_win:
    name: Build wheel for ${{ matrix.python }}-win_amd64
    runs-on: windows-2022
    continue-on-error: ${{ contains(matrix.python, 'cp314') }}
    strategy:
      fail-fast: false
      matrix:
        python: [cp310, cp311, cp312, cp313, cp313t, cp314t]

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          cache-suffix: ${{ matrix.python }}-win_amd64
          cache-dependency-glob: uv.lock
      - name: Install Xmake
        uses: MinoruSekine/setup-scoop@v4.0.2
        with:
          apps: xmake
      - name: Cache Xmake
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/.xmake
          key: xmake-win_amd64-${{ hashFiles('xmake.lua') }}
      - name: Workaround for SourceForge 404 (giflib)
        shell: bash
        run: |
          mkdir -p ~/AppData/Local/.xmake/searchdirs
          curl -L "https://github.com/python-pillow/pillow-depends/raw/main/giflib-5.2.2.tar.gz" -o ~/AppData/Local/.xmake/searchdirs/giflib-5.2.2.tar.gz
          xmake g --pkg_searchdirs="~/AppData/Local/.xmake/searchdirs"
      - name: Build wheel
        uses: pypa/cibuildwheel@v3.2.0
        env:
          CIBW_BUILD: ${{ matrix.python }}-win_amd64
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.python }}-win_amd64
          path: ./wheelhouse/*.whl

  build_linux:
    name: Build wheel for ${{ matrix.python }}-${{ matrix.platform }}_${{ matrix.archs }}
    runs-on: ubuntu-24.04${{ matrix.archs == 'aarch64' && '-arm' || '' }}
    continue-on-error: ${{ contains(matrix.python, 'cp314') }}
    strategy:
      fail-fast: false
      matrix:
        python: [cp310, cp311, cp312, cp313, cp313t, cp314t]
        platform: [manylinux, musllinux]
        archs: [x86_64, aarch64]

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: /tmp/setup-uv-cache
          key: setup-uv-${{ hashFiles('uv.lock') }}-${{ matrix.python }}-${{ matrix.platform }}_${{ matrix.archs }}
      - name: Cache tools
        uses: actions/cache@v4
        with:
          path: /tmp/.local
          key: tools-${{ matrix.platform }}_${{ matrix.archs }}
      - name: Cache Xmake
        uses: actions/cache@v4
        with:
          path: |
            /tmp/.xmake
            !/tmp/.xmake/**/.git
          key: xmake-${{ matrix.platform }}_${{ matrix.archs }}-${{ hashFiles('xmake.lua') }}
      - name: Build wheel (manylinux)
        if: contains(matrix.platform, 'manylinux')
        uses: pypa/cibuildwheel@v3.2.0
        env:
          CIBW_BUILD: ${{ matrix.python }}-${{ matrix.platform }}_${{ matrix.archs }}
          CIBW_BEFORE_ALL: |
            curl -fsSL "https://github.com/xmake-io/xmake/releases/download/v${XMAKE_VERSION}/xmake-v${XMAKE_VERSION}.gz.run" -o /tmp/xmake.gz.run
            bash /tmp/xmake.gz.run
            mkdir -p ~/.xmake/searchdirs
            curl -L "https://github.com/python-pillow/pillow-depends/raw/main/giflib-5.2.2.tar.gz" -o ~/.xmake/searchdirs/giflib-5.2.2.tar.gz
            ~/.local/bin/xmake g --pkg_searchdirs=~/.xmake/searchdirs
          CIBW_ENVIRONMENT: |
            XMAKE_ROOT=y
            PATH=$PATH:$HOME/.local/bin
            LDFLAGS="-lpthread"
            CFLAGS="-pthread"
            XMAKE_VERSION=${{ env.XMAKE_VERSION }}
      - name: Build wheel (musllinux)
        if: contains(matrix.platform, 'musllinux')
        uses: pypa/cibuildwheel@v3.2.0
        env:
          CIBW_BUILD: ${{ matrix.python }}-${{ matrix.platform }}_${{ matrix.archs }}
          CIBW_BEFORE_ALL: |
            apk add curl bash git patch unzip tar
            apk add 7zip || apk add p7zip || true
            curl -fsSL "https://github.com/xmake-io/xmake/releases/download/v${XMAKE_VERSION}/xmake-v${XMAKE_VERSION}.gz.run" -o /tmp/xmake.gz.run
            bash /tmp/xmake.gz.run
            ~/.local/bin/xmake repo -u
            mkdir -p ~/.xmake/searchdirs
            curl -L "https://github.com/python-pillow/pillow-depends/raw/main/giflib-5.2.2.tar.gz" -o ~/.xmake/searchdirs/giflib-5.2.2.tar.gz
            ~/.local/bin/xmake g --pkg_searchdirs=~/.xmake/searchdirs
          CIBW_ENVIRONMENT: |
            XMAKE_ROOT=y
            PATH=$PATH:$HOME/.local/bin
            LDFLAGS="-lpthread"
            CFLAGS="-pthread"
            XMAKE_VERSION=${{ env.XMAKE_VERSION }}
      - name: Chown Xmake cache
        run: |
          shopt -s globstar
          sudo rm -rf /tmp/.xmake/**/.git  # FIXME: workaround for https://github.com/actions/toolkit/issues/2155
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.python }}-${{ matrix.platform }}_${{ matrix.archs }}
          path: ./wheelhouse/*.whl

  sdist:
    name: Build Source Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Build sdist
        run: uv build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  package:
    name: Package + Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build_macosx_arm64, build_macosx_x86_64, build_win, build_linux, sdist]
    permissions:
      id-token: write  # required for OIDC trusted publisher
      contents: read
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true
      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        run: uv publish --trusted-publishing always
