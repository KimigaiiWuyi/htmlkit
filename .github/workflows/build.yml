name: Build Wheels
on:
  push:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    paths:
      - 'src/**'
      - 'xmake.lua'
      - 'pyproject.toml'

jobs:
  build_linux:
    name: Build wheel for ${{ matrix.python }}-${{ matrix.platform }}_${{ matrix.archs }}
    runs-on: ubuntu-24.04${{ matrix.archs == 'aarch64' && '-arm' || '' }}
    strategy:
      fail-fast: false
      matrix:
        python: [cp312]
        platform: [manylinux, musllinux] 
        archs: [x86_64, aarch64]

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Build wheel (manylinux)
        if: contains(matrix.platform, 'manylinux')
        uses: pypa/cibuildwheel@v3.2.0
        env:
          CIBW_BUILD: ${{ matrix.python }}-${{ matrix.platform }}_${{ matrix.archs }}
          CIBW_BEFORE_ALL: |
            curl -fsSL "https://github.com/xmake-io/xmake/releases/download/v2.9.9/xmake-v2.9.9.gz.run" -o /tmp/xmake.gz.run
            bash /tmp/xmake.gz.run
            mkdir -p ~/.xmake/searchdirs
            curl -L "https://github.com/python-pillow/pillow-depends/raw/main/giflib-5.2.2.tar.gz" -o ~/.xmake/searchdirs/giflib-5.2.2.tar.gz
            ~/.local/bin/xmake g --pkg_searchdirs=~/.xmake/searchdirs
          CIBW_ENVIRONMENT: |
            XMAKE_ROOT=y
            PATH=$PATH:$HOME/.local/bin
            LDFLAGS="-lpthread"
            CFLAGS="-pthread"
      - name: Build wheel (musllinux)
        if: contains(matrix.platform, 'musllinux')
        uses: pypa/cibuildwheel@v3.2.0
        env:
          CIBW_BUILD: ${{ matrix.python }}-${{ matrix.platform }}_${{ matrix.archs }}
          CIBW_BEFORE_ALL: |
            apk add curl bash git patch unzip tar
            apk add 7zip || apk add p7zip || true
            curl -fsSL "https://github.com/xmake-io/xmake/releases/download/v2.9.9/xmake-v2.9.9.gz.run" -o /tmp/xmake.gz.run
            bash /tmp/xmake.gz.run
            ~/.local/bin/xmake repo -u
            mkdir -p ~/.xmake/searchdirs
            curl -L "https://github.com/python-pillow/pillow-depends/raw/main/giflib-5.2.2.tar.gz" -o ~/.xmake/searchdirs/giflib-5.2.2.tar.gz
            ~/.local/bin/xmake g --pkg_searchdirs=~/.xmake/searchdirs
          CIBW_ENVIRONMENT: |
            XMAKE_ROOT=y
            PATH=$PATH:$HOME/.local/bin
            LDFLAGS="-lpthread"
            CFLAGS="-pthread"
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.python }}-${{ matrix.platform }}_${{ matrix.archs }}
          path: ./wheelhouse/*.whl

  # 3. 删除了 sdist 编译任务 (如果你只需要 wheel)

  package:
    if: startsWith(github.ref, 'refs/tags/')
    name: Package + Publish to PyPI
    runs-on: ubuntu-latest
    # --- 修改处：needs 只保留 build_linux ---
    needs: [build_linux] 
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: wheels
          pattern: wheel-*
      - name: Collect wheels into dist
        run: |
          mkdir -p dist
          find wheels -name '*.whl' -exec cp -n {} dist/ \;
      - name: Verify wheel integrity
        run: |
          for whl in dist/*.whl; do
            python3 -m zipfile -t "$whl" || { echo "CORRUPT: $whl"; exit 1; }
          done
          echo "All wheels passed integrity check"
          ls -la dist/
      # 如果上面删除了 sdist，记得把下面 download sdist 的步骤也去掉
      - name: Install uv
        uses: astral-sh/setup-uv@v7